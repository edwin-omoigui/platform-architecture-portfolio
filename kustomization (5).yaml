{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "platform-demo-app.fullname" . }}
  labels:
    {{- include "platform-demo-app.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.parentRef.name }}
      namespace: {{ .Values.gateway.parentRef.namespace }}
  hostnames:
    - {{ .Values.gateway.hostname | quote }}
  rules:
    - backendRefs:
        - name: {{ include "platform-demo-app.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
