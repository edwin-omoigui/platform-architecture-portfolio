#!/usr/bin/env bash
set -euo pipefail

NAMESPACE="${1:-platform-demo}"

kubectl -n "$NAMESPACE" get deploy,pod,svc,hpa,pdb,networkpolicy
kubectl -n "$NAMESPACE" wait --for=condition=available deploy/platform-demo-app --timeout=120s

echo "Deployment is available."

echo "To test locally:"
echo "kubectl -n $NAMESPACE port-forward svc/platform-demo-app 8080:80"
