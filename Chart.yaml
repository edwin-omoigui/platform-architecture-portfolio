[project]
name = "platform-demo-app"
version = "1.0.0"
description = "Production-style demo API for platform architecture portfolio"
requires-python = ">=3.12"
dependencies = [
  "fastapi==0.115.6",
  "uvicorn[standard]==0.34.0",
  "prometheus-client==0.21.1",
  "pydantic-settings==2.7.1",
  "structlog==24.4.0"
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
