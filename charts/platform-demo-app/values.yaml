replicaCount: 2

image:
  repository: platform-demo-app
  tag: "1.0.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

app:
  serviceName: platform-demo-app
  tenantName: demo-tenant
  environment: local
  region: local
  platformOwner: platform-engineering

platformContracts:
  postgresHost: postgres.platform-data.svc.cluster.local
  s3Endpoint: http://object-storage.platform-data.svc.cluster.local:9000
  oidcIssuerUrl: https://identity.example.com/realms/demo
  otelExporterOtlpEndpoint: http://otel-collector.observability.svc.cluster.local:4317

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

serviceAccount:
  create: true
  automountServiceAccountToken: false

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true

serviceMonitor:
  enabled: false

gateway:
  enabled: false
  hostname: platform-demo.example.com
