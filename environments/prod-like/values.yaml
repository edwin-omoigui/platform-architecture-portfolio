replicaCount: 3

image:
  repository: platform-demo-app
  tag: "1.0.0"
  pullPolicy: IfNotPresent

app:
  tenantName: enterprise-demo
  environment: prod-like
  region: primary
  platformOwner: platform-engineering

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 2
