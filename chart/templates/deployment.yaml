apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-demo-app
  labels:
    app.kubernetes.io/name: platform-demo-app
    app.kubernetes.io/part-of: platform-architecture-portfolio
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-demo-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platform-demo-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: TENANT_NAME
              value: {{ .Values.platform.tenantName | quote }}
            - name: ENVIRONMENT
              value: {{ .Values.platform.environment | quote }}
            - name: OIDC_ISSUER_URL
              value: {{ .Values.platform.oidcIssuerUrl | quote }}
            - name: POSTGRES_HOST
              value: {{ .Values.platform.postgresHost | quote }}
            - name: S3_ENDPOINT
              value: {{ .Values.platform.s3Endpoint | quote }}
            - name: OTEL_ENDPOINT
              value: {{ .Values.platform.otelEndpoint | quote }}
          readinessProbe:
            httpGet:
              path: /ready
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
