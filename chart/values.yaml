replicaCount: 2

image:
  repository: platform-demo-app
  tag: "1.0.0"
  pullPolicy: IfNotPresent

service:
  port: 80
  targetPort: 8080

platform:
  tenantName: demo-tenant
  environment: portfolio
  oidcIssuerUrl: https://identity.example.com/realms/demo
  postgresHost: postgres.platform-services.svc.cluster.local
  s3Endpoint: https://object-storage.example.com
  otelEndpoint: http://otel-collector.observability.svc.cluster.local:4317

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
