apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-secure-pod-defaults
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: require-non-root
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "Pods should run as non-root."
        pattern:
          spec:
            securityContext:
              runAsNonRoot: true
